apiVersion: v1
kind: Service
metadata:
  name: metal-lb-service
  labels:
    app: grpc
    role: grpc-metallb-service
spec:
  type: LoadBalancer
  #loadBalancerIP: 192.168.130.20       # <--- specify IP from pool range to use (optional)
  selector:
    role: grpc-server
  ports:
  - name: grpc-listen
    protocol: TCP
    port: 30010
    targetPort: 50051
  allocateLoadBalancerNodePorts: false   # < -- see https://kubernetes.io/docs/concepts/services-networking/service/#load-balancer-nodeport-allocation
