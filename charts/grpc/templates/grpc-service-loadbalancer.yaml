apiVersion: v1
kind: Service
metadata:
  name: lb-service
  labels:
    app: grpc
    role: grpc-lb-service
spec:
  type: LoadBalancer
  #loadBalancerIP: 192.168.130.20       # <--- specify IP from pool range to use (optional)
  selector:
    role: grpc-server
  ports:
  - name: grpc-listen
    protocol: TCP
    port: 30010
    targetPort: 50051
  allocateLoadBalancerNodePorts: true