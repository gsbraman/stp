apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.namespace }}
  name: swagger-service  
  labels:
    app: swagger-openshift
    owner: sbraman
spec:
  type: ClusterIP
  selector:
    app: swagger-openshift
  ports:
  - name: swagger
    protocol: TCP
    port: 9080 # external facing port of the service
    targetPort: 8080 # port swagger container is listening on
